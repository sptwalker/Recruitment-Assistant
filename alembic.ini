[alembic]
script_location = recruitment_assistant/storage/migrations
prepend_sys_path = .
version_path_separator = os
# M1: unified SQLite. env.py overrides this URL with RESUME_DB_PATH; placeholder only.
sqlalchemy.url = sqlite:///data/resume_archive.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
