<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 280px; padding: 16px; font-family: -apple-system, sans-serif; font-size: 13px; color: #333; }
    h3 { margin: 0 0 12px; font-size: 15px; color: #4A90E2; }
    .status { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.on { background: #52c41a; }
    .dot.off { background: #ccc; }
    .info { color: #666; font-size: 12px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee; }
  </style>
</head>
<body>
  <h3>Boss直聘采集助手</h3>
  <div class="status">
    <span class="dot" id="wsDot"></span>
    <span id="wsStatus">检测中...</span>
  </div>
  <div class="status">
    <span class="dot" id="pageDot"></span>
    <span id="pageStatus">-</span>
  </div>
  <div class="info">
    采集控制请在 Streamlit 面板操作<br>
    (08_BOSS采集 页面)
  </div>
  <script src="popup.js"></script>
</body>
</html>
