# SPA 托管 + 后端反代（前端与 API 同源，httpOnly cookie 生效）。
# WebSocket 升级用于 /crawl/ws（扩展/SPA 采集通道）。

# WS 升级所需：按 Upgrade 头决定 Connection 头。
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 纯后端 API（无同名 SPA 路由）：无条件反代，Accept 不参与。
    location ~ ^/(auth|crawl|healthz) {
        # 动态响应绝不缓存：曾因浏览器缓存旧的 /auth/* 响应导致 OAuth 跳转失效。
        add_header Cache-Control "no-store" always;
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket 升级（/crawl/ws）
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    # SPA 同名路由（/candidates /jobs /logs）：Accept 启发式区分页面导航 vs API 调用。
    location ~ ^/(candidates|jobs|logs) {
        # 浏览器刷新/深链时发 Accept: text/html → 交给 SPA；axios 默认不含 text/html，打后端。
        # ponytail: 本应用够用（axios 从不发 text/html）。要更稳就把后端整体挪到 /api/* 前缀
        # （改 client baseURL + 路由挂载 + 测试），届时删掉这段 if 与这个 location。
        if ($http_accept ~* text/html) {
            rewrite ^ /index.html last;
        }
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # index.html 不缓存：内容哈希的 assets/* 可长缓存，但入口壳必须每次校验，
    # 否则前端更新后浏览器仍加载旧壳、引用失效的旧 JS。
    location = /index.html {
        add_header Cache-Control "no-cache" always;
    }

    # 其余走 SPA：history 路由回退到 index.html。
    location / {
        try_files $uri $uri/ /index.html;
    }
}
