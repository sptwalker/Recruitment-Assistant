# SPA 托管 + 后端反代（前端与 API 同源，httpOnly cookie 生效）。
# WebSocket 升级用于 /crawl/ws（扩展/SPA 采集通道）。

# WS 升级所需：按 Upgrade 头决定 Connection 头。
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 后端 API 前缀反代到 backend 容器。正则命中 /auth /candidates /jobs /logs /crawl /healthz。
    location ~ ^/(auth|candidates|jobs|logs|crawl|healthz) {
        # 陷阱：/candidates /jobs /logs 同时是 SPA 前端路由。浏览器刷新/深链这些页面时发
        # Accept: text/html → 应交给 SPA（否则被反代成 JSON/401）；axios 默认 Accept 不含
        # text/html，XHR/WS 才真打后端。
        # ponytail: 靠 Accept 头区分「页面导航」与「API 调用」，本应用够用（axios 从不发
        # text/html）。要更稳就把后端整体挪到 /api/* 前缀（改 client baseURL + 路由挂载 +
        # 测试），届时删掉这段 if。
        if ($http_accept ~* text/html) {
            rewrite ^ /index.html last;
        }
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket 升级（/crawl/ws）
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    # 其余走 SPA：history 路由回退到 index.html。
    location / {
        try_files $uri $uri/ /index.html;
    }
}
